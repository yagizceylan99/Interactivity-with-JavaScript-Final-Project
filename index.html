<!DOCTYPE html>

    <title>Photo Gallery</title>
    <link rel="stylesheet" href="css/gallery.css">
    <script src="js/gallery.js" defer></script>
</head>

<body>

    <div id="image">

    </div>

        <img class="preview" alt="Akali" src="/images/akali.png"
        onmouseover="upDate(this)" onmouseout="unDo()">

        <img class="preview" alt="Akshan" src="/images/akshan.png"
        onmouseover="upDate(this)" onmouseout="unDo()">

        <img class="preview" alt="Alistar" src="/images/alistar.png"
        onmouseover="upDate(this)" onmouseout="unDo()">

        <img class="preview" alt="Ambessa" src="/images/ambessa.png"
        onmouseover="upDate(this)" onmouseout="unDo()">
    </div>

</body>

</html>
